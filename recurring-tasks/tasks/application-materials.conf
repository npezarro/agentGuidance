ENABLED=true
PERMISSION_MODE="scoped"
ALLOWED_TOOLS="Read Edit Write Glob Grep Bash"

# Task-specific variables
TASK_VAR_MATERIALS_DIR="Job Search Files"
TASK_VAR_RESUME_FILE="Job Search Files/resume_anthropic_blended.md"
TASK_VAR_CONTEXT_FILE="Job Search Files/resume_additional_context.md"
