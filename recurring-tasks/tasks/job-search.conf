# job-search.conf — Expand AI PM role catalogue
DESCRIPTION="Expand AI PM role catalogue with new postings from the last 7 days"
SCHEDULE="0 9 * * 1,4"
TIMEOUT=2400
OUTPUT_MODE="branch-pr"
WORKING_DIR="/home/npezarro/repos/assortedLLMTasks"
MAX_TURNS=80
ENABLED=true
PERMISSION_MODE="scoped"
ALLOWED_TOOLS="Read Edit Write Glob Grep Bash WebSearch WebFetch"

# Task-specific variables available in prompt template as {{VAR_NAME}}
TASK_VAR_CATALOGUE_FILE="Job Search Files/ai_pm_roles_march2026.md"
TASK_VAR_TARGET_PROFILE="Senior PM, 10+ yrs, GenAI/LLM, consumer + research, Bay Area"
